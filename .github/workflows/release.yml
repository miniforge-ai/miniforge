name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2026.01.20.1)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: macos
            arch: arm64
            runner: macos-14
          - os: macos
            arch: x86_64
            runner: macos-13
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-latest-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest
          bb: latest

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: clojure-${{ runner.os }}-${{ hashFiles('deps.edn', '**/deps.edn') }}
          restore-keys: |
            clojure-${{ runner.os }}-

      - name: Build uberscript
        run: bb build:cli

      - name: Create artifact name
        id: artifact
        run: |
          ARTIFACT_NAME="miniforge-${{ matrix.os }}-${{ matrix.arch }}"
          echo "name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          echo "file=dist/miniforge" >> $GITHUB_OUTPUT

      - name: Rename binary
        run: |
          cp dist/miniforge dist/${{ steps.artifact.outputs.name }}

      - name: Generate SHA256 checksum
        run: |
          cd dist
          shasum -a 256 ${{ steps.artifact.outputs.name }} > ${{ steps.artifact.outputs.name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            dist/${{ steps.artifact.outputs.name }}
            dist/${{ steps.artifact.outputs.name }}.sha256
          retention-days: 5

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -R artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -name 'miniforge-*' -exec cp {} release/ \;
          ls -lh release/

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name != '' && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: release/*
          generate_release_notes: true
          body: |
            ## miniforge ${{ steps.version.outputs.version }}

            ### Installation

            #### Homebrew (macOS and Linux)
            ```bash
            brew install miniforge-ai/tap/miniforge
            ```

            #### Direct download
            Download the binary for your platform from the assets below, make it executable, and move it to your PATH:

            **macOS ARM64 (Apple Silicon)**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/miniforge-macos-arm64 -o miniforge
            chmod +x miniforge
            sudo mv miniforge /usr/local/bin/
            ```

            **macOS x86_64 (Intel)**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/miniforge-macos-x86_64 -o miniforge
            chmod +x miniforge
            sudo mv miniforge /usr/local/bin/
            ```

            **Linux x86_64**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/miniforge-linux-x86_64 -o miniforge
            chmod +x miniforge
            sudo mv miniforge /usr/local/bin/
            ```

            **Linux ARM64**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/miniforge-linux-arm64 -o miniforge
            chmod +x miniforge
            sudo mv miniforge /usr/local/bin/
            ```

            ### Verification
            Verify the installation:
            ```bash
            miniforge version
            ```

            ### Changes
            See the release notes below for details.

  homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMEBREW_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_APP_PRIVATE_KEY }}
          owner: miniforge-ai
          repositories: homebrew-tap

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: miniforge-ai/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}
          path: homebrew-tap

      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: miniforge-macos-arm64
          path: artifacts/macos-arm64

      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: miniforge-macos-x86_64
          path: artifacts/macos-x86_64

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: miniforge-linux-x86_64
          path: artifacts/linux-x86_64

      - name: Download Linux ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: miniforge-linux-arm64
          path: artifacts/linux-arm64

      - name: Generate formula
        run: |
          VERSION="${{ needs.release.outputs.version }}"

          # Read SHA256 checksums
          MACOS_ARM64_SHA=$(cat artifacts/macos-arm64/miniforge-macos-arm64.sha256 | awk '{print $1}')
          MACOS_X86_SHA=$(cat artifacts/macos-x86_64/miniforge-macos-x86_64.sha256 | awk '{print $1}')
          LINUX_X86_SHA=$(cat artifacts/linux-x86_64/miniforge-linux-x86_64.sha256 | awk '{print $1}')
          LINUX_ARM64_SHA=$(cat artifacts/linux-arm64/miniforge-linux-arm64.sha256 | awk '{print $1}')

          cat > homebrew-tap/Formula/miniforge.rb << EOF
          class Miniforge < Formula
            desc "Autonomous SDLC platform - convert intent to production software"
            homepage "https://miniforge.ai"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/miniforge-macos-arm64"
                sha256 "${MACOS_ARM64_SHA}"
              else
                url "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/miniforge-macos-x86_64"
                sha256 "${MACOS_X86_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/miniforge-linux-arm64"
                sha256 "${LINUX_ARM64_SHA}"
              else
                url "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/miniforge-linux-x86_64"
                sha256 "${LINUX_X86_SHA}"
              end
            end

            depends_on "babashka"

            def install
              bin.install "miniforge-macos-arm64" => "miniforge" if OS.mac? && Hardware::CPU.arm?
              bin.install "miniforge-macos-x86_64" => "miniforge" if OS.mac? && Hardware::CPU.intel?
              bin.install "miniforge-linux-arm64" => "miniforge" if OS.linux? && Hardware::CPU.arm?
              bin.install "miniforge-linux-x86_64" => "miniforge" if OS.linux? && Hardware::CPU.intel?
            end

            test do
              assert_match "miniforge", shell_output("#{bin}/miniforge version")
            end
          end
          EOF

      - name: Commit and push formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/miniforge.rb
          git commit -m "Update miniforge to ${{ needs.release.outputs.version }}"
          git push
