name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2026.01.20.1)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: macos
            arch: arm64
            runner: macos-latest
          - os: linux
            arch: x86_64
            runner: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest
          bb: latest

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: clojure-${{ runner.os }}-${{ hashFiles('deps.edn', '**/deps.edn') }}
          restore-keys: |
            clojure-${{ runner.os }}-

      - name: Build uberscript
        run: bb build:cli

      - name: Create artifact name
        id: artifact
        run: |
          ARTIFACT_NAME="miniforge-${{ matrix.os }}-${{ matrix.arch }}"
          echo "name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Rename binary
        run: |
          cp dist/miniforge.jar dist/${{ steps.artifact.outputs.name }}

      - name: Generate SHA256 checksum
        run: |
          cd dist
          shasum -a 256 ${{ steps.artifact.outputs.name }} > ${{ steps.artifact.outputs.name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            dist/${{ steps.artifact.outputs.name }}
            dist/${{ steps.artifact.outputs.name }}.sha256
          retention-days: 5

  # Windows is a preview artifact: packaged as a zip containing the
  # JVM-portable miniforge.jar + an mf.cmd launcher that defers to bb on
  # the user's PATH (installed via scoop). continue-on-error keeps the
  # release pipeline green while the Windows path is still in beta —
  # see docs/platform-support.md.
  build-windows:
    name: Build windows-x86_64 (preview)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Clojure + bb (Windows)
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest
          bb: latest

      # `bb build:cli` shells out to `clojure` through Java
      # ProcessBuilder. On GitHub-hosted Windows runners setup-clojure
      # exposes the Clojure CLI as a PowerShell module, not a real
      # executable, so install deps.clj as clojure.exe / clj.exe.
      - name: Install deps.clj shim (Windows)
        shell: pwsh
        run: |
          $depsVersion = "1.12.4.1618"
          $depsDir = "$env:USERPROFILE\.deps-clj"
          New-Item -ItemType Directory -Force -Path $depsDir | Out-Null
          Invoke-WebRequest `
            -Uri "https://github.com/borkdude/deps.clj/releases/download/v${depsVersion}/deps.clj-${depsVersion}-windows-amd64.zip" `
            -OutFile deps.zip
          Expand-Archive deps.zip -DestinationPath $depsDir -Force
          Copy-Item "$depsDir\deps.exe" "$depsDir\clojure.exe"
          Copy-Item "$depsDir\deps.exe" "$depsDir\clj.exe"
          "$depsDir" >> $env:GITHUB_PATH
          Write-Host "clojure/clj installed at $depsDir (via deps.clj $depsVersion)"

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: clojure-${{ runner.os }}-${{ hashFiles('deps.edn', '**/deps.edn') }}
          restore-keys: |
            clojure-${{ runner.os }}-

      - name: Build uberjar
        run: bb build:cli
        shell: pwsh

      - name: Package zip with mf.cmd launcher
        shell: pwsh
        run: |
          $name = "miniforge-windows-x86_64"
          $stage = "dist/$name"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item dist/miniforge.jar "$stage/miniforge.jar"
          @"
          @echo off
          bb --jar "%~dp0miniforge.jar" -m ai.miniforge.cli.main %*
          "@ | Out-File -Encoding ascii "$stage/mf.cmd"
          $zip = "dist/$name.zip"
          if (Test-Path $zip) { Remove-Item $zip }
          Compress-Archive -Path "$stage/*" -DestinationPath $zip
          $sha = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$sha  $name.zip" | Out-File -Encoding ascii "dist/$name.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: miniforge-windows-x86_64
          path: |
            dist/miniforge-windows-x86_64.zip
            dist/miniforge-windows-x86_64.zip.sha256
          retention-days: 5

  release:
    name: Create GitHub Release
    # Wait on both, but allow release to ship even if the Windows preview
    # build fails — Mac/Linux builds remain the gating dependency.
    needs: [build, build-windows]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -R artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -name 'miniforge-*' -exec cp {} release/ \;
          ls -lh release/

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name != '' && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: release/*
          generate_release_notes: true
          body: |
            ## Miniforge ${{ steps.version.outputs.version }}

            ### Installation

            #### Homebrew (macOS and Linux)
            ```bash
            brew install miniforge-ai/tap/miniforge
            ```

            #### Direct download
            Download the binary for your platform from the assets below, make it executable, and move it to your PATH:

            **macOS ARM64 (Apple Silicon)**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/miniforge-macos-arm64 -o miniforge
            chmod +x miniforge
            sudo mv miniforge /usr/local/bin/
            ```

            **Linux x86_64**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/miniforge-linux-x86_64 -o miniforge
            chmod +x miniforge
            sudo mv miniforge /usr/local/bin/
            ```

            **Windows x86_64 (preview)**

            Requires `bb.exe` on PATH (`scoop install babashka` — see the
            [Platform Support](https://github.com/${{ github.repository }}/blob/main/docs/platform-support.md)
            page). The Windows artifact may be missing if the preview build
            failed — check the assets list below.
            ```powershell
            Invoke-WebRequest -Uri https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/miniforge-windows-x86_64.zip -OutFile miniforge.zip
            Expand-Archive miniforge.zip -DestinationPath $env:LOCALAPPDATA\Programs\miniforge
            $env:PATH += ";$env:LOCALAPPDATA\Programs\miniforge"
            mf version
            ```

            ### Verification
            Verify the installation:
            ```bash
            mf version
            ```

            ### Changes
            See the release notes below for details.

  homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMEBREW_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_APP_PRIVATE_KEY }}
          owner: miniforge-ai
          repositories: homebrew-tap

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: miniforge-ai/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}
          path: homebrew-tap

      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: miniforge-macos-arm64
          path: artifacts/macos-arm64

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: miniforge-linux-x86_64
          path: artifacts/linux-x86_64

      - name: Generate formula
        run: |
          VERSION="${{ needs.release.outputs.version }}"

          # Read SHA256 checksums
          MACOS_ARM64_SHA=$(cat artifacts/macos-arm64/miniforge-macos-arm64.sha256 | awk '{print $1}')
          LINUX_X86_SHA=$(cat artifacts/linux-x86_64/miniforge-linux-x86_64.sha256 | awk '{print $1}')

          # Create Formula directory if it doesn't exist
          mkdir -p homebrew-tap/Formula

          cat > homebrew-tap/Formula/miniforge.rb << 'FORMULA_EOF'
          class Miniforge < Formula
            desc "Autonomous software factory — built on MiniForge Core"
            homepage "https://miniforge.ai"
            version "RELEASE_VERSION"
            license "Apache-2.0"

            on_macos do
              url "https://github.com/miniforge-ai/miniforge/releases/download/vRELEASE_VERSION/miniforge-macos-arm64"
              sha256 "MACOS_SHA_PLACEHOLDER"
            end

            on_linux do
              url "https://github.com/miniforge-ai/miniforge/releases/download/vRELEASE_VERSION/miniforge-linux-x86_64"
              sha256 "LINUX_SHA_PLACEHOLDER"
            end

            depends_on "babashka"

            def install
              jar_name = "miniforge.jar"
              if OS.mac?
                libexec.install "miniforge-macos-arm64" => jar_name
              else
                libexec.install "miniforge-linux-x86_64" => jar_name
              end

              (bin/"mf").write <<~SH
                #!/bin/bash
                exec bb --jar "#{libexec}/#{jar_name}" -m ai.miniforge.cli.main "$@"
              SH
            end

            test do
              assert_match "miniforge", shell_output("#{bin}/mf --help 2>&1")
            end
          end
          FORMULA_EOF

          # Substitute version and checksums
          sed -i "s/RELEASE_VERSION/${VERSION}/g" homebrew-tap/Formula/miniforge.rb
          sed -i "s/MACOS_SHA_PLACEHOLDER/${MACOS_ARM64_SHA}/g" homebrew-tap/Formula/miniforge.rb
          sed -i "s/LINUX_SHA_PLACEHOLDER/${LINUX_X86_SHA}/g" homebrew-tap/Formula/miniforge.rb

      - name: Commit and push formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/miniforge.rb
          git commit -m "Update miniforge to ${{ needs.release.outputs.version }}"
          git push

  # Trigger the scoop bucket's autoupdate workflow so the manifest picks
  # up this release within seconds instead of waiting for the bucket's
  # daily cron. The bucket workflow listens on `repository_dispatch` of
  # type `miniforge-release`. Reuses the existing GitHub App that the
  # homebrew job authenticates with — the app already has access to all
  # repos in the org, so we just point at scoop-bucket here.
  scoop:
    name: Trigger Scoop Bucket Autoupdate
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMEBREW_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_APP_PRIVATE_KEY }}
          owner: miniforge-ai
          repositories: scoop-bucket

      - name: Fire repository_dispatch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          gh api repos/miniforge-ai/scoop-bucket/dispatches \
            -f event_type=miniforge-release \
            -F "client_payload[version]=$VERSION" \
            -F "client_payload[source]=miniforge-release-${{ github.run_id }}"
          echo "Dispatched miniforge-release event for v$VERSION"
