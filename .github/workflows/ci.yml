name: CI

# This workflow runs linting, tests, and builds on every push and PR.
# All output is captured in log files and uploaded as artifacts for debugging.
# Logs are retained for 7 days and can be downloaded from the Actions UI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest
          bb: latest
          clj-kondo: latest

      - name: Install markdownlint
        run: |
          npm install -g markdownlint-cli

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: clojure-${{ runner.os }}-${{ hashFiles('deps.edn', '**/deps.edn') }}
          restore-keys: |
            clojure-${{ runner.os }}-

      - name: Lint Clojure
        run: |
          echo "::group::Clojure Linting"
          bb lint:clj:all 2>&1 | tee clj-kondo.log
          echo "::endgroup::"

      - name: Lint Markdown
        run: |
          echo "::group::Markdown Linting"
          bb fmt:md:all 2>&1 | tee markdownlint.log || true
          echo "::endgroup::"
        continue-on-error: true

      - name: Upload lint logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-logs-${{ github.sha }}
          path: |
            clj-kondo.log
            markdownlint.log
          retention-days: 7

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest
          bb: latest

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: clojure-${{ runner.os }}-${{ hashFiles('deps.edn', '**/deps.edn') }}
          restore-keys: |
            clojure-${{ runner.os }}-

      - name: Run tests
        run: |
          echo "::group::Running Tests"
          bb test:all 2>&1 | tee test-output.log
          echo "::endgroup::"

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.sha }}
          path: test-output.log
          retention-days: 7

  # Windows fidelity job. Non-blocking (continue-on-error) until the
  # Windows tester signs off — see docs/platform-support.md. Once stable,
  # promote this to a required check and drop continue-on-error.
  test-windows:
    name: Test (Windows preview)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure git for stable line endings
        run: |
          git config --global core.autocrlf input
          git config --global core.eol lf
        shell: pwsh

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Clojure + bb (Windows)
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest
          bb: latest

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: clojure-${{ runner.os }}-${{ hashFiles('deps.edn', '**/deps.edn') }}
          restore-keys: |
            clojure-${{ runner.os }}-

      - name: Platform check
        run: bb check:platform
        shell: pwsh

      - name: Run tests
        run: bb test:all
        shell: pwsh

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest
          bb: latest

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: clojure-${{ runner.os }}-${{ hashFiles('deps.edn', '**/deps.edn') }}
          restore-keys: |
            clojure-${{ runner.os }}-

      - name: Compile all code
        run: |
          echo "::group::Compiling Code"
          bb compile 2>&1 | tee compile.log
          echo "::endgroup::"

      - name: Build CLI
        run: |
          echo "::group::Building CLI"
          bb build:cli 2>&1 | tee build-cli.log
          echo "::endgroup::"

      - name: Test CLI
        run: |
          echo "::group::Testing CLI"
          ./dist/miniforge version 2>&1 | tee -a cli-test.log
          ./dist/miniforge help 2>&1 | tee -a cli-test.log
          echo "::endgroup::"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            compile.log
            build-cli.log
            cli-test.log
          retention-days: 7

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: miniforge-cli-${{ github.sha }}
          path: dist/miniforge
          retention-days: 7
